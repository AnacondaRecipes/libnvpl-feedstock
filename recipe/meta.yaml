{% set version = "26.5.0" %}

package:
  name: libnvpl-split
  version: {{ (version ~ ".0.0").split('.')[:3] | join('.') }}

source:
  # License-only source: the outputs are metapackages with no payload, but the
  # recipe needs the NVPL license text for license_file (and the linter
  # requires a source section).
  url: https://developer.download.nvidia.com/compute/nvpl/redist/nvpl_common/LICENSE.txt
  sha256: d81174652f0c448a5736afc5d50663606863bfd6ee8c8416fbd9a628c6f8802f

build:
  number: 0
  # These are 'technically' not noarch packages: NVPL targets NVIDIA Grace
  # (linux-aarch64/sbsa) only, and every package these constrain or depend on
  # exists only on linux-aarch64. Therefore upstream's 'noarch: generic' is
  # replaced with 'skip: true' to avoid building on unsupported platforms
  # (same convention as cuda-runtime-feedstock).
  skip: true  # [not (linux and aarch64)]

# All of the NVPL components development packages depend on this mutex which
# constrains the environment to a matching set of packages. The mutex only
# constrains development packages; runtime packages are constrained by their
# soname which tracks ABI compatability.
# https://developer.download.nvidia.com/compute/nvpl/redist/

outputs:

  - name: _nvpl_dev_mutex
    requirements:
      run_constrained:
        - libnvpl-blas-dev 0.6.0.*
        - libnvpl-common-dev 0.3.5.*
        - libnvpl-fft-dev 0.6.0.*
        - libnvpl-lapack-dev 0.4.0.*
        - libnvpl-rand-dev 0.5.4.*
        - libnvpl-scalapack-dev 0.2.4.*
        - libnvpl-sparse-dev 0.6.0.*
        - libnvpl-tensor-dev 0.3.3.*
    test:
      commands:
        - exit 0

  - name: libnvpl-dev
    build:
      # Skipped until all libnvpl-* component -dev packages are released to
      # pkgs/main: the component feedstocks build sequentially against
      # defaults, and this metapackage's run deps would not resolve before
      # then. The _nvpl_dev_mutex output above must ship FIRST (every
      # component -dev package depends on it). Remove this skip in the final
      # pass of the NVPL release chain (PKG-15071).
      skip: true
    requirements:
      run:
        - {{ pin_subpackage('_nvpl_dev_mutex', exact=True) }}
        - libnvpl-blas-dev
        - libnvpl-common-dev
        - libnvpl-fft-dev
        - libnvpl-lapack-dev
        - libnvpl-rand-dev
        - libnvpl-scalapack-dev
        - libnvpl-sparse-dev
        - libnvpl-tensor-dev
    test:
      commands:
        - exit 0

about:
  home: https://developer.nvidia.com/nvpl
  license: LicenseRef-NVIDIA-End-User-License-Agreement
  license_family: Proprietary
  license_file: LICENSE.txt
  summary: >-
    The NVIDIA Performance Libraries (NVPL). For convenience only! Not to be
    used in host requirements for conda recipes!
  description: >-
    The NVIDIA Performance Libraries (NVPL) are a collection of high performance
    mathematical libraries optimized for the NVIDIA Grace Armv9.0 architecture.
    These CPU-only libraries have no dependencies on CUDA or CTK, and are drop in
    replacements for standard C and Fortran mathematical APIs allowing HPC
    applications to achieve maximum performance on the Grace platform.
  doc_url: https://docs.nvidia.com/nvpl/
  dev_url: https://developer.nvidia.com/nvpl

extra:
  feedstock-name: libnvpl
  recipe-maintainers:
    - conda-forge/cuda
